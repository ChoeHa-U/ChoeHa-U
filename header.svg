<svg fill="none" width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Courier New', Courier, monospace;
          background: rgba(20, 20, 20, 0.6); /* Dark translucent overlay */
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          display: flex;
          padding: 20px;
          color: #cdd6f4; /* Catppuccin-style text color */
          text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .ascii {
          margin-right: 25px;
          border-radius: 8px;
          border: 2px solid #b4befe;
        }
        .info {
          line-height: 1.4;
          font-size: 14px;
        }
        .user { color: #89b4fa; font-weight: bold; }
        .host { color: #f5c2e7; font-weight: bold; }
        .label { color: #94e2d5; margin-right: 5px; }
        .colors { display: flex; margin-top: 10px; }
        .block { width: 15px; height: 15px; margin-right: 5px; border-radius: 3px; }
      </style>

      <div class="container">
        <img class="ascii" src="https://raw.githubusercontent.com/ChoeHa-U/ChoeHa-U/main/profile_pic.jpg" width="140" height="140" />
        
        <div class="info">
          <div><span class="user">ChoeHa-U</span>@<span class="host">github</span></div>
          <div>-------------------------</div>
          <div><span class="label">OS:</span> B.Sc CS Graduate / MCA Student</div>
          <div><span class="label">Focus:</span> UI/UX &amp; Open Source</div>
          <div><span class="label">Languages:</span> Kotlin, Flutter, Python</div>
          <div><span class="label">Learning:</span> Rust, C</div>
          <div><span class="label">Music:</span> Electronic, POP, Funk</div>
          
          <div class="colors">
            <div class="block" style="background: #f38ba8;"></div>
            <div class="block" style="background: #fab387;"></div>
            <div class="block" style="background: #f9e2af;"></div>
            <div class="block" style="background: #a6e3a1;"></div>
            <div class="block" style="background: #89b4fa;"></div>
            <div class="block" style="background: #cba6f7;"></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
