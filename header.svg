<svg fill="none" width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/xhtml" xmlns:xlink="http://www.w3.org/1999/xlink">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .terminal-container {
          font-family: 'Ubuntu Mono', 'Cascadia Code', monospace;
          background: linear-gradient(-45deg, #11111b, #1e1e2e, #313244, #181825);
          background-size: 400% 400%;
          animation: gradient 12s ease infinite;
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 20px;
          display: flex;
          align-items: center;
          padding: 35px;
          color: #cdd6f4;
          box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .img-wrapper {
          width: 180px;
          height: 180px;
          margin-right: 45px;
          flex-shrink: 0;
        }

        .profile-pic {
          width: 100%;
          height: 100%;
          border-radius: 15px;
          border: 2px solid #b4befe;
          object-fit: cover;
        }

        .stats {
          line-height: 1.6;
          font-size: 18px;
        }

        .user-host { font-weight: bold; margin-bottom: 10px; font-size: 24px; }
        .user { color: #89b4fa; }
        .host { color: #f5c2e7; }
        .sep { color: #6c7086; }
        .label { color: #94e2d5; font-weight: bold; }
        
        .color-palette {
          display: flex;
          margin-top: 20px;
        }
        .dot {
          width: 20px;
          height: 20px;
          border-radius: 5px;
          margin-right: 10px;
        }
      </style>

      <div class="terminal-container">
        <div class="img-wrapper">
          <img class="profile-pic" src="https://raw.githubusercontent.com/ChoeHa-U/ChoeHa-U/main/profile_pic.jpg" />
        </div>
        
        <div class="stats">
          <div class="user-host"><span class="user">ChoeHa-U</span><span class="sep">@</span><span class="host">github</span></div>
          <div class="sep">-------------------------</div>
          <div><span class="label">OS:</span> B.Sc CS Graduate / MCA Student</div>
          <div><span class="label">Focus:</span> UI/UX &amp; Open Source</div>
          <div><span class="label">Languages:</span> <span style="color:#f9e2af">Kotlin, Flutter, Python</span></div>
          <div><span class="label">Learning:</span> <span style="color:#fab387">Rust, C</span></div>
          <div><span class="label">Music:</span> <span style="color:#a6e3a1">Electronic, POP, Funk</span></div>
          
          <div class="color-palette">
            <div class="dot" style="background: #f38ba8;"></div>
            <div class="dot" style="background: #fab387;"></div>
            <div class="dot" style="background: #f9e2af;"></div>
            <div class="dot" style="background: #a6e3a1;"></div>
            <div class="dot" style="background: #89b4fa;"></div>
            <div class="dot" style="background: #cba6f7;"></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
