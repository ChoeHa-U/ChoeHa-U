<svg width="650" height="200" viewBox="0 0 650 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="picClip">
      <rect x="22" y="22" width="136" height="156" rx="10" ry="10"/>
    </clipPath>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="650" height="200" rx="16" ry="16" fill="url(#borderGrad)"/>

  <!-- Dark card body (1.5px inset = consistent border width on all sides) -->
  <rect x="1.5" y="1.5" width="647" height="197" rx="14.5" ry="14.5" fill="#0d1117"/>

  <!-- Profile picture frame -->
  <rect x="21" y="21" width="138" height="158" rx="11" ry="11"
        fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- Embedded profile photo -->
<image
  href="profile_pic.jpg"
  x="22" y="22" width="136" height="156"
  preserveAspectRatio="xMidYMid slice"
  clip-path="url(#picClip)"
/>

  <!-- Vertical separator -->
  <line x1="177" y1="20" x2="177" y2="180" stroke="#21262d" stroke-width="1"/>

  <!-- Username -->
  <text x="196" y="52" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">ChoeHa-U@github</text>

  <!-- Dash separator -->
  <text x="196" y="67" font-family="'Courier New', Courier, monospace" font-size="10" fill="#30363d" letter-spacing="2">- - - - - - - - - - - - - - - - - - - - -</text>

  <!-- OS -->
  <text x="196" y="87" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#3fb950" font-weight="bold">OS:</text>
  <text x="232" y="87" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">B.Sc CS Graduate / MCA Student</text>

  <!-- Focus -->
  <text x="196" y="105" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#3fb950" font-weight="bold">Focus:</text>
  <text x="252" y="105" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">UI/UX &amp; Open Source</text>

  <!-- Languages -->
  <text x="196" y="123" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#3fb950" font-weight="bold">Languages:</text>
  <text x="298" y="123" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">Kotlin, Flutter, Python</text>

  <!-- Learning -->
  <text x="196" y="141" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#3fb950" font-weight="bold">Learning:</text>
  <text x="286" y="141" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">Rust, C</text>

  <!-- Music -->
  <text x="196" y="159" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#3fb950" font-weight="bold">Music:</text>
  <text x="249" y="159" font-family="'Courier New', Courier, monospace" font-size="12.5" fill="#c9d1d9">Electronic, POP, Funk</text>

  <!-- Colour palette dots — vertically centered between last text row and bottom -->
  <circle cx="196" cy="181" r="7" fill="#f47067"/>
  <circle cx="216" cy="181" r="7" fill="#f6a741"/>
  <circle cx="236" cy="181" r="7" fill="#e4cd6e"/>
  <circle cx="256" cy="181" r="7" fill="#57ab5a"/>
  <circle cx="276" cy="181" r="7" fill="#4d8ef0"/>
  <circle cx="296" cy="181" r="7" fill="#986ee2"/>

</svg>
